<style>
  :root{
    --teal:#0fb5ae; --teal-dark:#0c948e;
    --accent:#ff5e57; --accent-dark:#e0453f;
    --bg:#f4f6f8; --card:#ffffff; --line:#e7eaee;
    --ink:#15181f; --muted:#8a92a0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);}
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  header{
    background:var(--card);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  #header-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  #header-top h1{margin:0;font-size:18px;font-weight:800;}
  #admin-badge{
    flex-shrink:0;width:36px;height:36px;border-radius:10px;background:var(--bg);
    border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  #search-row{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:14px;padding:9px 12px;}
  #search-row svg{flex-shrink:0;color:var(--muted);}
  #search-input{border:none;background:transparent;outline:none;flex:1;font-size:14px;color:var(--ink);}
  #search-clear{display:none;border:none;background:#dfe3e9;color:#666;width:20px;height:20px;border-radius:50%;font-size:12px;cursor:pointer;align-items:center;justify-content:center;}
  #district-filter{
    margin-top:8px;width:100%;padding:9px 12px;border:1.5px solid var(--line);border-radius:12px;
    font-size:13px;color:var(--ink);background:var(--card);outline:none;
  }
  .place-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
  .place-tag-chip{font-size:10.5px;font-weight:600;color:var(--teal-dark);background:#eafaf9;padding:2px 8px;border-radius:8px;}
  .price-badge{font-size:10.5px;font-weight:800;padding:2px 6px;border-radius:6px;vertical-align:middle;}
  .price-badge.price-1{background:#e8f7ee;color:#2fbf71;}
  .price-badge.price-2{background:#fff4e0;color:#c98a1a;}
  .price-badge.price-3{background:#fde3e1;color:var(--accent-dark);}
  .booking-btn{display:inline-block;margin-top:6px;font-size:11.5px;font-weight:700;color:#fff;background:var(--orange,#ff8a3d);padding:5px 11px;border-radius:10px;cursor:pointer;}
  .price-choice{flex:1;text-align:center;padding:9px 6px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;color:#8a92a0;}
  .price-choice.active{border-color:var(--teal);background:#eafaf9;color:var(--teal-dark);}
  .booking-btn:hover{filter:brightness(0.95);}

  #list{flex:1;overflow-y:auto;padding:10px 0 90px;}
  .empty-state{padding:40px 24px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6;}

  .section{margin:0 12px 10px;background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--line);}
  .section-header{
    display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;
  }
  .section-emoji{font-size:18px;flex-shrink:0;}
  .section-title{flex:1;font-size:14.5px;font-weight:700;}
  .section-count{font-size:12px;color:var(--muted);flex-shrink:0;}
  .section-chevron{flex-shrink:0;color:var(--muted);transition:transform 0.2s;font-size:12px;}
  .section.open .section-chevron{transform:rotate(180deg);}
  .section-del{flex-shrink:0;width:26px;height:26px;border:none;background:transparent;color:var(--muted);border-radius:6px;font-size:13px;cursor:pointer;}
  .section-del:hover{background:#fde3e1;color:var(--accent-dark);}
  .section-body{display:none;border-top:1px solid var(--line);}
  .section.open .section-body{display:block;}

  .district-label{
    padding:9px 16px 4px;font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:0.4px;color:var(--teal-dark);border-top:1px solid var(--line);background:#f0fbfa;
  }
  .district-label:first-child{border-top:none;}
  .place-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(--line);cursor:pointer;}
  .place-row:first-child{border-top:none;}
  .place-row:hover{background:var(--bg);}
  .place-info{flex:1;min-width:0;}
  .place-name{font-size:13.5px;font-weight:700;color:var(--ink);}
  .place-comment{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
  .place-actions{display:flex;gap:2px;flex-shrink:0;}
  .icon-btn{width:28px;height:28px;border:none;border-radius:7px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--muted);}
  .icon-btn:hover{background:var(--bg);}
  .icon-btn.delete:hover{background:#fde3e1;color:var(--accent-dark);}
  .place-go{color:#2b7fff;font-size:15px;flex-shrink:0;}

  .add-place-row{padding:11px 16px;border-top:1px solid var(--line);font-size:12.5px;font-weight:700;color:var(--teal-dark);cursor:pointer;}
  .add-place-row:hover{background:var(--bg);}

  #add-section-btn{
    margin:6px 12px 20px;padding:13px;border-radius:14px;border:1.5px dashed #c7ccd4;
    background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;width:calc(100% - 24px);
  }
  #add-section-btn:hover{border-color:var(--teal);color:var(--teal-dark);}

  body:not(.is-admin) .admin-only{display:none !important;}

  #sync-badge{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(20,24,30,0.85);color:#fff;font-size:11px;padding:6px 14px;
    border-radius:16px;display:none;z-index:900;
  }
  #sync-badge.show{display:block;}
  #map-toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:rgba(20,24,30,0.92);color:#fff;font-size:12.5px;padding:9px 16px;
    border-radius:20px;z-index:900;max-width:85%;text-align:center;display:none;
  }
  #map-toast.show{display:block;}

  #overlay{position:fixed;inset:0;background:rgba(20,24,30,0.5);display:none;align-items:center;justify-content:center;z-index:2000;}
  #overlay.show{display:flex;}
  #modal{background:#fff;border-radius:20px;width:min(380px,90vw);padding:20px;box-shadow:0 12px 30px rgba(0,0,0,0.35);max-height:88vh;overflow-y:auto;}
  #modal h3{margin:0 0 10px;font-size:16px;}
  #modal p.desc{margin:0 0 14px;font-size:12.5px;color:var(--muted);line-height:1.4;}
  .field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin:0 0 5px;display:block;}
  #modal input[type=text], #modal textarea{
    width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;
    font-size:14px;outline:none;margin-bottom:14px;font-family:inherit;
  }
  #modal textarea{resize:vertical;min-height:50px;}
  #modal input[type=text]:focus, #modal textarea:focus{border-color:var(--teal);}
  #modal-actions{display:flex;gap:8px;justify-content:flex-end;}
  #modal-actions button{padding:10px 18px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;}
  #modal-cancel{background:var(--bg);color:#555;}
  #modal-confirm{background:var(--teal);color:#fff;}
  #modal-confirm:hover{background:var(--teal-dark);}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="header-top">
      <h1>🌴 Гид по Пхукету <span style="font-size:9px;color:#c7ccd4;font-weight:400;">Firebase-версия</span></h1>
      <button id="admin-badge" title="Профиль / админ">👤</button>
    </div>
    <div id="search-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search-input" type="text" list="tag-options" placeholder="Например: устрицы, массаж, закат..." />
      <button id="search-clear">✕</button>
    </div>
    <datalist id="tag-options"></datalist>
    <select id="district-filter">
      <option value="">Любой район</option>
    </select>
  </header>

  <div id="list"></div>
</div>

<div id="sync-badge">Сохраняю…</div>
<div id="map-toast"></div>

<div id="overlay">
  <div id="modal">
    <h3 id="modal-title">Новое место</h3>
    <p class="desc" id="modal-desc">Заполните информацию</p>
    <div id="modal-name-block">
      <span class="field-label">Название</span>
      <input id="modal-name" type="text" placeholder="Например: Пляж Патонг" />
    </div>
    <div id="modal-url-block">
      <span class="field-label">Ссылка Google Maps</span>
      <input id="modal-url" type="text" placeholder="https://maps.app.goo.gl/..." />
    </div>
    <div id="modal-booking-block">
      <span class="field-label">Ссылка на бронирование (необязательно)</span>
      <input id="modal-booking" type="text" placeholder="https://..." />
    </div>
    <div id="modal-price-block">
      <span class="field-label">Цена (необязательно)</span>
      <div id="modal-price-row" style="display:flex;gap:8px;margin-bottom:14px;">
        <div class="price-choice" data-price="0">Нет</div>
        <div class="price-choice" data-price="1">$</div>
        <div class="price-choice" data-price="2">$$</div>
        <div class="price-choice" data-price="3">$$$</div>
      </div>
    </div>
    <div id="modal-cat-block">
      <span class="field-label">Раздел</span>
      <input id="modal-category" type="text" list="category-options" placeholder="Пляжи, Рестораны, Отели..." />
      <datalist id="category-options"></datalist>
    </div>
    <div id="modal-district-block">
      <span class="field-label">Район</span>
      <select id="modal-district" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;outline:none;margin-bottom:14px;font-family:inherit;background:#fff;"></select>
    </div>
    <div id="modal-tags-block">
      <span class="field-label">Теги через запятую (необязательно)</span>
      <input id="modal-tags" type="text" placeholder="устрицы, морепродукты" />
    </div>
    <div id="modal-comment-block">
      <span class="field-label">Комментарий (необязательно)</span>
      <textarea id="modal-comment" placeholder="Заметка о месте..."></textarea>
    </div>
    <div id="modal-actions">
      <button id="modal-cancel">Отмена</button>
      <button id="modal-confirm">Сохранить</button>
    </div>
  </div>
</div>

// ---------- Storage ----------
const syncBadge = document.getElementById('sync-badge');
let badgeTimer=null, debounceTimer=null, saveInFlight=false, saveQueued=false, saveFailCount=0, syncDisabled=false;

async function loadPersonalData(){
  // Ничего не нужно грузить вручную — Firebase Auth сам восстанавливает сессию
  // и вызовет onAuthStateChanged выше, если человек уже был залогинен.
}
function saveAdminFlag(){
  // Не нужно — Firebase Auth сам хранит сессию входа.
}
async function loadFromStorage(){
  if (!firebaseReady){ syncDisabled = true; return; }
  try{
    const snap = await SHARED_DOC.get();
    if (snap.exists){
      const data = snap.data();
      if (data && data.json){
        const parsed = JSON.parse(data.json);
        state = Object.assign({categories:[], places:[], counter:1, seeded:false}, parsed);
      }
    }
  }catch(e){
    console.error('Firestore load failed', e);
  }
}
async function saveToStorage(){
  if (syncDisabled || !firebaseReady) return;
  if (saveInFlight){ saveQueued = true; return; }
  saveInFlight = true;
  syncBadge.classList.add('show'); syncBadge.textContent='Сохраняю…';
  try{
    await SHARED_DOC.set({ json: JSON.stringify(state), updatedAt: Date.now() });
    saveFailCount = 0;
  }catch(e){
    console.error('Firestore save failed', e);
    saveFailCount++;
    if (saveFailCount<=5){ saveQueued=true; }
    else { syncDisabled=true; }
  }
  saveInFlight=false;
  clearTimeout(badgeTimer);
  badgeTimer=setTimeout(()=>syncBadge.classList.remove('show'),600);
  if (saveQueued && !syncDisabled){ saveQueued=false; setTimeout(saveToStorage,700); }
}
function scheduleSave(){ if (syncDisabled) return; clearTimeout(debounceTimer); debounceTimer=setTimeout(saveToStorage,400); }

function ensureCategory(cat){ if (cat && !state.categories.includes(cat)) state.categories.push(cat); }

// ---------- Data ops ----------
function addPlace(name, url, category, comment, district, tags, bookingUrl, price){
  const id = state.counter++;
  state.places.push({id, name, url, category, comment: comment||'', district: district||'Другое', tags: tags||[], bookingUrl: bookingUrl||'', price: price||0});
  ensureCategory(category);
  openSections.add(category);
  render(); scheduleSave();
}
function editPlace(id, name, url, category, comment, district, tags, bookingUrl, price){
  const p = state.places.find(x=>x.id===id);
  if (!p) return;
  p.name=name; p.url=url; p.category=category; p.comment=comment; p.district=district||'Другое'; p.tags=tags||[]; p.bookingUrl=bookingUrl||''; p.price=price||0;
  ensureCategory(category);
  render(); scheduleSave();
}
function removePlace(id){
  if (!isAdmin){ showToast('Редактировать гид может только администратор'); return; }
  state.places = state.places.filter(p=>p.id!==id);
  render(); scheduleSave();
}
function deleteCategory(name){
  if (state.categories.length<=1){ showToast('Должен остаться хотя бы один раздел'); return; }
  const count = state.places.filter(p=>p.category===name).length;
  const desc = count>0 ? `${count} ${count===1?'место переместится':'мест переместятся'} в другой раздел.` : 'В этом разделе нет мест.';
  openConfirm(`Удалить раздел «${name}»?`, desc + ' Отменить нельзя.', 'Удалить', ()=>{
    const fallback = state.categories.find(c=>c!==name) || 'Другое';
    ensureCategory(fallback);
    state.places.forEach(p=>{ if (p.category===name) p.category=fallback; });
    state.categories = state.categories.filter(c=>c!==name);
    render(); scheduleSave();
    showToast(`Раздел «${name}» удалён`);
  });
}

// ---------- Render ----------
function matchesSearch(p){
  if (districtFilter && (p.district||'Другое')!==districtFilter) return false;
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase().replace(/^#/,'');
  const tagsStr = (p.tags||[]).join(' ');
  return (p.name+' '+(p.comment||'')+' '+p.category+' '+tagsStr).toLowerCase().includes(q);
}

function renderDistrictGroups(places){
  let html = '';
  DISTRICTS.forEach(d=>{
    const group = places.filter(p=>(p.district||'Другое')===d);
    if (group.length===0) return;
    html += `<div class="district-label">${d}</div>`;
    html += group.map(p=>{
      const tier = p.price||0;
      return `
      <div class="place-row" data-open="${p.id}">
        <div class="place-info">
          <div class="place-name">${escapeHtml(p.name)} ${tier ? `<span class="price-badge price-${tier}">${'$'.repeat(tier)}</span>` : ''}</div>
          ${p.comment ? `<div class="place-comment">${escapeHtml(p.comment)}</div>` : ''}
          ${(p.tags&&p.tags.length) ? `<div class="place-tags">${p.tags.map(t=>`<span class="place-tag-chip">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          ${p.bookingUrl ? `<div class="booking-btn" data-book="${p.id}">🎟 Забронировать</div>` : ''}
        </div>
        <span class="place-go">↗</span>
        <div class="place-actions admin-only">
          <button class="icon-btn" data-edit="${p.id}" title="Изменить">✎</button>
          <button class="icon-btn delete" data-del="${p.id}" title="Удалить">✕</button>
        </div>
      </div>
    `;
    }).join('');
  });
  return html;
}

function render(){
  refreshTagOptions();
  const list = document.getElementById('list');
  const cats = state.categories;
  if (cats.length===0){
    list.innerHTML = `<div class="empty-state">Пока нет ни одного раздела.<br>${isAdmin ? 'Нажмите «+ Новый раздел» ниже.' : 'Загляните позже.'}</div>`;
    return;
  }

  let html = '';
  let anyVisible = false;

  cats.forEach(cat=>{
    const places = state.places.filter(p=>p.category===cat && matchesSearch(p));
    if (searchQuery && places.length===0) return;
    anyVisible = true;
    const isOpen = openSections.has(cat) || (searchQuery && places.length>0);
    html += `
      <div class="section ${isOpen?'open':''}" data-cat="${escapeHtml(cat)}">
        <div class="section-header" data-toggle="${escapeHtml(cat)}">
          <span class="section-emoji">${catEmoji(cat)}</span>
          <span class="section-title">${escapeHtml(cat)}</span>
          <span class="section-count">${places.length}</span>
          <span class="section-chevron">▾</span>
          <button class="section-del admin-only" data-delcat="${escapeHtml(cat)}" title="Удалить раздел">✕</button>
        </div>
        <div class="section-body">
          ${places.length===0 ? `<div class="empty-state" style="padding:20px;">Пока пусто</div>` : renderDistrictGroups(places)}
          <div class="add-place-row admin-only" data-addto="${escapeHtml(cat)}">+ Добавить место в «${escapeHtml(cat)}»</div>
        </div>
      </div>
    `;
  });

  if (searchQuery && !anyVisible){
    html = `<div class="empty-state">Ничего не найдено по запросу «${escapeHtml(searchQuery)}»</div>`;
  }

  html += `<button id="add-section-btn" class="admin-only">+ Новый раздел</button>`;
  list.innerHTML = html;

  list.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if (e.target.closest('[data-delcat]')) return;
      const cat = el.dataset.toggle;
      if (openSections.has(cat)) openSections.delete(cat); else openSections.add(cat);
      render();
    });
  });
  list.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if (e.target.closest('[data-edit],[data-del],[data-book]')) return;
      const p = state.places.find(x=>x.id===Number(el.dataset.open));
      if (p) window.open(p.url, '_blank');
    });
  });
  list.querySelectorAll('[data-book]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const p = state.places.find(x=>x.id===Number(el.dataset.book));
      if (p && p.bookingUrl) window.open(p.bookingUrl, '_blank');
    });
  });
  list.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); openEditForm(Number(el.dataset.edit)); });
  });
  list.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); removePlace(Number(el.dataset.del)); });
  });
  list.querySelectorAll('[data-delcat]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); deleteCategory(el.dataset.delcat); });
  });
  list.querySelectorAll('[data-addto]').forEach(el=>{
    el.addEventListener('click', (e)=>{ e.stopPropagation(); openAddForm(el.dataset.addto); });
  });
  const addSectionBtn = document.getElementById('add-section-btn');
  if (addSectionBtn) addSectionBtn.addEventListener('click', openAddCategoryForm);
}

const modalDesc = document.getElementById('modal-desc');

const priceBlock = document.getElementById('modal-price-block');

const catBlock = document.getElementById('modal-cat-block');

const districtSelect = document.getElementById('modal-district');

const tagsFieldInput = document.getElementById('modal-tags');

const nameInput = document.getElementById('modal-name');
const urlInput = document.getElementById('modal-url');
const catInput = document.getElementById('modal-category');
const commentInput = document.getElementById('modal-comment');
const catOptions = document.getElementById('category-options');
const modalConfirm = document.getElementById('modal-confirm');
const modalCancel = document.getElementById('modal-cancel');
let modalMode = 'place'; // 'place' | 'category' | 'confirm'
let editingId = null;
let cbConfirmOnly = null;
let selectedPrice = 0;

districtSelect.innerHTML = DISTRICTS.map(d=>`<option value="${d}">${d}</option>`).join('');

priceRow.querySelectorAll('.price-choice').forEach(el=>{
  el.addEventListener('click', ()=>{
    selectedPrice = Number(el.dataset.price);
    priceRow.querySelectorAll('.price-choice').forEach(x=>x.classList.toggle('active', x===el));

function setPriceChoice(val){
  selectedPrice = val||0;
  priceRow.querySelectorAll('.price-choice').forEach(x=>x.classList.toggle('active', Number(x.dataset.price)===selectedPrice));
}

function refreshCategoryOptions(){
  catOptions.innerHTML = state.categories.map(c=>`<option value="${escapeHtml(c)}"></option>`).join('');
}
function openModal({title, desc, placeholder, defaultValue, confirmLabel, onConfirm}){
  modalMode='simple'; editingId=null;
  modalTitle.textContent=title; modalDesc.textContent=desc;
  nameBlock.style.display='block'; urlBlock.style.display='none'; bookingBlock.style.display='none'; priceBlock.style.display='none'; catBlock.style.display='none'; districtBlock.style.display='none'; tagsFieldBlock.style.display='none'; commentBlock.style.display='none';
  document.querySelector('#modal-name-block .field-label').textContent='Название';
  nameInput.type='text';
  nameInput.placeholder=placeholder||'';
  nameInput.value=defaultValue||'';
  cbConfirmOnly=onConfirm;
  modalConfirm.textContent=confirmLabel||'ОК';
  overlay.classList.add('show');
  setTimeout(()=>{nameInput.focus(); nameInput.select();},50);
}

function openAddForm(defaultCat){
  if (!isAdmin){ showToast('Редактировать гид может только администратор'); return; }
  modalMode='place'; editingId=null;
  modalTitle.textContent='Новое место'; modalDesc.textContent='Название, ссылка Google Maps, раздел, район и заметка';
  nameBlock.style.display='block'; urlBlock.style.display='block'; bookingBlock.style.display='block'; priceBlock.style.display='block'; catBlock.style.display='block'; districtBlock.style.display='block'; tagsFieldBlock.style.display='block'; commentBlock.style.display='block';
  refreshCategoryOptions();
  nameInput.value=''; urlInput.value=''; commentInput.value=''; tagsFieldInput.value=''; bookingInput.value='';
  setPriceChoice(0);
  catInput.value = defaultCat || state.categories[0] || '';
  districtSelect.value = 'Патонг';
  modalConfirm.textContent='Добавить';
  overlay.classList.add('show');
  setTimeout(()=>nameInput.focus(),50);
}
function openEditForm(id){
  if (!isAdmin){ showToast('Редактировать гид может только администратор'); return; }
  const p = state.places.find(x=>x.id===id);
  if (!p) return;
  modalMode='place'; editingId=id;
  modalTitle.textContent='Изменить место'; modalDesc.textContent='Обновите информацию';
  nameBlock.style.display='block'; urlBlock.style.display='block'; bookingBlock.style.display='block'; priceBlock.style.display='block'; catBlock.style.display='block'; districtBlock.style.display='block'; tagsFieldBlock.style.display='block'; commentBlock.style.display='block';
  refreshCategoryOptions();
  nameInput.value=p.name; urlInput.value=p.url; catInput.value=p.category; commentInput.value=p.comment||'';
  tagsFieldInput.value=(p.tags||[]).join(', ');
  bookingInput.value=p.bookingUrl||'';
  setPriceChoice(p.price||0);
  districtSelect.value = p.district || 'Другое';
  modalConfirm.textContent='Сохранить';
  overlay.classList.add('show');
  setTimeout(()=>nameInput.focus(),50);
}
function openAddCategoryForm(){
  if (!isAdmin){ showToast('Редактировать гид может только администратор'); return; }
  modalMode='category'; editingId=null;
  modalTitle.textContent='Новый раздел'; modalDesc.textContent='Например «Массаж» или «Смотровые площадки»';
  nameBlock.style.display='block'; urlBlock.style.display='none'; bookingBlock.style.display='none'; priceBlock.style.display='none'; catBlock.style.display='none'; districtBlock.style.display='none'; tagsFieldBlock.style.display='none'; commentBlock.style.display='none';
  nameInput.value='';
  modalConfirm.textContent='Создать';
  overlay.classList.add('show');
  setTimeout(()=>nameInput.focus(),50);
}
function openConfirm(title, desc, confirmLabel, onConfirm){
  modalMode='confirm'; editingId=null;
  modalTitle.textContent=title; modalDesc.textContent=desc;
  nameBlock.style.display='none'; urlBlock.style.display='none'; bookingBlock.style.display='none'; priceBlock.style.display='none'; catBlock.style.display='none'; districtBlock.style.display='none'; tagsFieldBlock.style.display='none'; commentBlock.style.display='none';
  cbConfirmOnly = onConfirm;
  modalConfirm.textContent=confirmLabel;
  overlay.classList.add('show');
}
function openInfo(title, html){
  modalMode='info'; editingId=null;
  modalTitle.textContent=title; modalDesc.innerHTML=html;
  nameBlock.style.display='none'; urlBlock.style.display='none'; bookingBlock.style.display='none'; priceBlock.style.display='none'; catBlock.style.display='none'; districtBlock.style.display='none'; tagsFieldBlock.style.display='none'; commentBlock.style.display='none';
  modalConfirm.textContent='Закрыть';
  overlay.classList.add('show');
}
function openPassword(title, desc, onConfirm){
  modalMode='password'; editingId=null;
  modalTitle.textContent=title; modalDesc.textContent=desc;
  nameBlock.style.display='block'; urlBlock.style.display='none'; bookingBlock.style.display='none'; priceBlock.style.display='none'; catBlock.style.display='none'; districtBlock.style.display='none'; tagsFieldBlock.style.display='none'; commentBlock.style.display='none';
  document.querySelector('#modal-name-block .field-label').textContent='Пароль';
  nameInput.value=''; nameInput.type='password'; nameInput.placeholder='Пароль';
  cbConfirmOnly = onConfirm;
  modalConfirm.textContent='Войти';
  overlay.classList.add('show');
  setTimeout(()=>nameInput.focus(),50);
}
function closeModal(){
  overlay.classList.remove('show');
  nameInput.type='text';
  document.querySelector('#modal-name-block .field-label').textContent='Название';
  nameInput.placeholder='Например: Пляж Патонг';
}

modalConfirm.addEventListener('click', function(){
  if (modalMode==='place'){
    const name=(nameInput.value||'').trim()||'Без названия';
    const url=(urlInput.value||'').trim();
    const category=(catInput.value||'').trim()||'Другое';
    const district=districtSelect.value||'Другое';
    const tags=(tagsFieldInput.value||'').split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
    const comment=(commentInput.value||'').trim();
    const bookingUrl=(bookingInput.value||'').trim();
    if (!url){ showToast('Добавьте ссылку на место'); return; }
    closeModal();
    if (editingId) editPlace(editingId, name, url, category, comment, district, tags, bookingUrl, selectedPrice);
    else addPlace(name, url, category, comment, district, tags, bookingUrl, selectedPrice);
  } else if (modalMode==='category'){
    const name=(nameInput.value||'').trim();
    closeModal();
    if (!name) return;
    ensureCategory(name); openSections.add(name);
    render(); scheduleSave();
  } else if (modalMode==='confirm'){
    const cb = cbConfirmOnly; cbConfirmOnly=null;
    closeModal();
    if (cb) cb();
  } else if (modalMode==='password'){
    const value = nameInput.value;
    const cb = cbConfirmOnly; cbConfirmOnly=null;
    closeModal();
    if (cb) cb(value);
  } else if (modalMode==='simple'){
    const value = nameInput.value;
    const cb = cbConfirmOnly; cbConfirmOnly=null;
    closeModal();
    if (cb) cb(value);
  } else {
    closeModal();
  }
});
modalCancel.addEventListener('click', closeModal);
overlay.addEventListener('click', (e)=>{ if (e.target===overlay) closeModal(); });
document.addEventListener('keydown', (e)=>{
  if (!overlay.classList.contains('show')) return;
  if (e.key==='Escape') closeModal();
  if (e.key==='Enter' && modalMode!=='place') modalConfirm.click();
});

document.getElementById('admin-badge').addEventListener('click', ()=>{

    <button onclick="window.toggleAdminPrompt()" style="width:100%;background:${isAdmin?'#f4f6f8':'#0fb5ae'};color:${isAdmin?'#e0453f':'#fff'};border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;">${isAdmin?'Выйти из режима администратора':'Войти как администратор'}</button>

});
window.toggleAdminPrompt = function(){
  if (isAdmin){
    auth.signOut();
    showToast('Вы вышли из режима администратора');
    closeModal();
  } else {
    openModal({
      title: 'Вход администратора',
      desc: 'Email из Firebase Authentication → Users',
      placeholder: 'you@example.com',
      confirmLabel: 'Далее',
      onConfirm: (email) => {
        email = (email||'').trim();
        if (!email){ return; }
        openPassword('Пароль', 'Пароль для '+email, (password)=>{
          if (!password){ return; }
          auth.signInWithEmailAndPassword(email, password)
            .then(()=>{ showToast('Вы вошли как администратор'); })
            .catch((err)=>{ showToast('Не удалось войти: '+(err.code||err.message)); });
        });
      }
    });
  }
};

// ---------- Init ----------
(async function init(){
  await loadPersonalData();
  await loadFromStorage();
  if (!state.seeded){
    SEED_DATA.forEach(it=>{
      const id = state.counter++;
      state.places.push({id, name:it.name, url:it.url, category:it.category, comment:it.comment||'', district:it.district||'Другое', tags:it.tags||[], bookingUrl:it.bookingUrl||'', price:it.price||0});
      ensureCategory(it.category);
    });
    state.seeded = true;
    state.districtsMigrated = true;
    scheduleSave();
  } else if (!state.districtsMigrated){
    // Data was seeded before districts existed — backfill from SEED_DATA by matching URL, fallback by name.
    state.places.forEach(p=>{
      if (p.district) return;
      const match = SEED_DATA.find(it=>it.url===p.url) || SEED_DATA.find(it=>it.name===p.name);
      p.district = (match && match.district) || 'Другое';
    });
    state.districtsMigrated = true;
    scheduleSave();
  }
  if (!state.districtsMigratedV2){
    // Refined district for a few specific places (Ао Йон, Пирс Лаэм → Панва; Wecafe → Вичит)
    const refineNames = ["Ао Йон","Пирс Лаэм","Wecafe"];
    state.places.forEach(p=>{
      if (!refineNames.includes(p.name)) return;
      const match = SEED_DATA.find(it=>it.url===p.url) || SEED_DATA.find(it=>it.name===p.name);
      if (match) p.district = match.district;
    });
    state.districtsMigratedV2 = true;
    scheduleSave();
  }
  if (!state.tagsMigrated){
    // Backfill tags for places that were seeded before tags existed.
    state.places.forEach(p=>{
      if (p.tags && p.tags.length) return;
      const match = SEED_DATA.find(it=>it.url===p.url) || SEED_DATA.find(it=>it.name===p.name);
      p.tags = (match && match.tags) || [];
    });
    state.tagsMigrated = true;
    scheduleSave();
  }
  if (!state.districtsMigratedV3){
    // Apply manually-corrected districts (from the offline version's export) by matching URL.
    state.places.forEach(p=>{
      const match = SEED_DATA.find(it=>it.url===p.url);
      if (match) p.district = match.district;
    });
    state.districtsMigratedV3 = true;
    scheduleSave();
  }
  if (!state.bookingMigrated){
    // Split location vs booking links for places where the URL used to BE the booking link.
    // Matched by name, since the url field itself changed for these entries.
    state.places.forEach(p=>{
      const match = SEED_DATA.find(it=>it.name===p.name);
      if (match && match.bookingUrl && !p.bookingUrl){
        p.bookingUrl = match.bookingUrl;
        if (!p.url || p.url === match.bookingUrl) p.url = match.url;
        if (p.comment && /Ссылка на бронирование|Бронирование:/.test(p.comment)) p.comment = match.comment || '';
      }
    });
    state.bookingMigrated = true;
    scheduleSave();
  }
  if (!state.seedSyncV2){
    // Bring in any brand-new places/categories added to SEED_DATA later (e.g. a new "ТЦ" section)
    // that already-seeded shared data wouldn't otherwise pick up.
    const existingUrls = new Set(state.places.map(p=>p.url));
    SEED_DATA.forEach(it=>{
      if (existingUrls.has(it.url)) return;
      const id = state.counter++;
      state.places.push({id, name:it.name, url:it.url, category:it.category, comment:it.comment||'', district:it.district||'Другое', tags:it.tags||[], bookingUrl:it.bookingUrl||'', price:it.price||0});
      ensureCategory(it.category);
    });
    SEED_DATA.forEach(it=>ensureCategory(it.category));
    state.seedSyncV2 = true;
    scheduleSave();
  }
  if (!state.bikeShopDistrictFix){
    const fixes = {'Байк-шоп 1':'Банг Тао','Байк-шоп 2':'Вичит','Байк-шоп 3':'Пхукет Таун','Байк-шоп 4':'Найтон'};
    state.places.forEach(p=>{
      if (fixes[p.name]) p.district = fixes[p.name];
    });
    state.bikeShopDistrictFix = true;
    scheduleSave();
  }
  if (!state.seedSyncV3){
    // Bring in the latest full re-sync: renamed places, new price field, new places (id 86-89), category moves.
    const existingUrls = new Set(state.places.map(p=>p.url));
    SEED_DATA.forEach(it=>{
      if (existingUrls.has(it.url)) return;
      const id = state.counter++;
      state.places.push({id, name:it.name, url:it.url, category:it.category, comment:it.comment||'', district:it.district||'Другое', tags:it.tags||[], bookingUrl:it.bookingUrl||'', price:it.price||0});
      ensureCategory(it.category);
    });
    state.places.forEach(p=>{
      const match = SEED_DATA.find(it=>it.url===p.url);
      if (match){
        p.name = match.name;
        p.category = match.category;
        p.comment = match.comment||'';
        if (p.price===undefined) p.price = match.price||0;
      }
    });
    SEED_DATA.forEach(it=>ensureCategory(it.category));
    state.seedSyncV3 = true;
    scheduleSave();
  }
  refreshAdminUI();
})();
</script>
